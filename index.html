<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣 ETF 成分股交叉分析</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d1117;
    --bg2:       #161b22;
    --bg3:       #1f2937;
    --border:    #30363d;
    --border2:   #21262d;
    --text:      #e6edf3;
    --text2:     #8b949e;
    --text3:     #6e7681;
    --accent:    #58a6ff;
    --green:     #3fb950;
    --red:       #f85149;
    --gold:      #d29922;
    --radius:    10px;
    --radius-lg: 16px;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Noto Sans TC', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(180deg, #0d1117 0%, #161b22 100%);
    border-bottom: 1px solid var(--border);
    padding: 32px 24px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(88,166,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .header h1 {
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
    position: relative;
  }
  .header h1 span { color: var(--accent); }
  .header-sub {
    margin-top: 8px;
    font-size: 13px;
    color: var(--text2);
    position: relative;
  }
  .header-sub b { color: var(--text); }

  /* ── Layout ── */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 20px;
  }

  /* ── Section titles ── */
  .section-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 14px;
    padding-left: 2px;
  }

  /* ── ETF Cards grid ── */
  .etf-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }
  .etf-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .etf-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--card-color, var(--accent));
    border-radius: 2px 2px 0 0;
  }
  .etf-card:hover {
    border-color: var(--card-color, var(--accent));
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .etf-card.active {
    border-color: var(--card-color, var(--accent));
    background: color-mix(in srgb, var(--card-color, var(--accent)) 8%, var(--bg2));
  }
  .card-ticker {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
    color: var(--card-color, var(--accent));
    margin-bottom: 2px;
  }
  .card-name {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 10px;
    line-height: 1.3;
  }
  .card-aum {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
  }
  .tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 20px;
    background: rgba(255,255,255,0.07);
    color: var(--text2);
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  .tag.active-tag {
    background: color-mix(in srgb, var(--card-color) 20%, transparent);
    color: var(--card-color, var(--accent));
    border-color: color-mix(in srgb, var(--card-color) 40%, transparent);
  }

  /* ── Stats bar ── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
    margin-bottom: 28px;
  }
  .stat-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    text-align: center;
  }
  .stat-label {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    color: var(--accent);
  }
  .stat-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    margin-bottom: 16px;
  }
  .controls label {
    font-size: 12px;
    color: var(--text2);
    white-space: nowrap;
  }
  select, input[type=text] {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: var(--sans);
    outline: none;
    transition: border-color 0.2s;
  }
  select:focus, input[type=text]:focus {
    border-color: var(--accent);
  }
  input[type=text] {
    min-width: 180px;
  }
  input[type=text]::placeholder { color: var(--text3); }

  /* ── Table ── */
  .table-wrap {
    overflow-x: auto;
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    background: var(--bg3);
    padding: 11px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text3);
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    position: sticky;
    top: 0;
    z-index: 2;
  }
  thead th:hover { color: var(--text); }
  thead th .sort-icon { margin-left: 4px; opacity: 0.4; }
  thead th.sort-asc .sort-icon::after { content: '↑'; opacity: 1; }
  thead th.sort-desc .sort-icon::after { content: '↓'; opacity: 1; }

  tbody tr {
    border-bottom: 1px solid var(--border2);
    transition: background 0.1s;
    cursor: pointer;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg3); }
  tbody tr.expanded { background: rgba(88,166,255,0.04); }

  td {
    padding: 10px 14px;
    vertical-align: middle;
  }
  .td-num {
    font-family: var(--mono);
    text-align: right;
  }
  .td-ticker {
    font-family: var(--mono);
    font-weight: 600;
    color: var(--accent);
    font-size: 14px;
  }
  .td-name {
    font-weight: 500;
  }

  /* coverage dots */
  .dot-row {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ETF badge pills inline */
  .etf-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .etf-pill {
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid;
    white-space: nowrap;
    cursor: default;
  }

  /* ── Expanded row ── */
  .expand-row td {
    padding: 0;
    background: #0d1117;
    border-bottom: 2px solid var(--border);
  }
  .expand-inner {
    padding: 16px 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .expand-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--ec-color, var(--accent));
    border-radius: 8px;
    padding: 12px 14px;
  }
  .ec-ticker {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    color: var(--ec-color, var(--accent));
    margin-bottom: 2px;
  }
  .ec-name { font-size: 11px; color: var(--text2); margin-bottom: 8px; }
  .ec-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text2);
    margin-top: 3px;
  }
  .ec-val {
    font-family: var(--mono);
    color: var(--text);
    font-size: 12px;
  }

  /* ── No results ── */
  .no-results {
    text-align: center;
    padding: 48px;
    color: var(--text3);
    font-size: 14px;
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 32px 20px;
    font-size: 11px;
    color: var(--text3);
    border-top: 1px solid var(--border2);
    margin-top: 40px;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  /* ── Progress bar for weight ── */
  .weight-bar-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 120px;
  }
  .weight-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    flex: 1;
    overflow: hidden;
  }
  .weight-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
  }
  .weight-val {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
    min-width: 48px;
    text-align: right;
  }
  .industry-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    background: rgba(255,255,255,0.06);
    color: var(--text2);
    border: 1px solid var(--border);
    white-space: nowrap;
  }
</style>
</head>

<div class="header">
  <h1>台灣 <span>ETF</span> 成分股交叉分析</h1>
  <p class="header-sub">含被動式 + 主動式 ETF &nbsp;|&nbsp; 資料日期：<b>2026/04/17</b> &nbsp;|&nbsp; 點擊個股展開各 ETF 明細</p>
</div>

    </select>
    <input type="text" id="search" placeholder="搜尋代號或名稱...">
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table id="mainTable">
      <thead>
        <tr>
          <th>#</th>
          <th data-col="ticker">代號 <span class="sort-icon"></span></th>

          <th>涵蓋 ETF</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<div class="footer">
  資料來源：各投信公司公告持股　|　僅供參考，不構成投資建議
</div>

  '2891':'金融','2892':'金融','2883':'金融','5880':'金融',
  '2880':'金融','2834':'金融','2412':'電信','3045':'電信',

  '1303':'石化','1326':'石化','6505':'石化','1216':'食品',

};

// ── Render ETF cards ──────────────────────────────────────────────────────
function renderETFCards() {
  const grid = document.getElementById('etfGrid');
  grid.innerHTML = ETF_CARDS.map((e, i) => `
    <div class="etf-card" style="--card-color:${e.color}"
         onclick="toggleETFFilter('${e.ticker}')" id="card-${e.ticker}">
      <div class="card-ticker">${e.ticker}</div>
      <div class="card-name">${e.name}</div>
      <div class="card-aum">${e.aum}</div>
      <div class="card-tags">
        ${e.tags.map(t => `<span class="tag">${t}</span>`).join('')}
      </div>
    </div>
  `).join('');
}

// ── Render stats bar ─────────────────────────────────────────────────────
function renderStats(rows) {
  const bar = document.getElementById('statsBar');
  const shown      = rows.length;
  const maxCovEtf  = rows.reduce((m,r) => Math.max(m, r.etf_count), 0);
  const maxCovRow  = rows.find(r => r.etf_count === maxCovEtf);
  const totalCap   = rows.reduce((s,r) => s + r.total_capital, 0);
  const etfsWithData = ETF_CARDS.filter(e =>
    CROSS_DATA.some(r => r.etfs.some(x => x.etf_ticker === e.ticker))
  ).length;

  bar.innerHTML = `
    <div class="stat-item">
      <div class="stat-label">顯示成分股</div>
      <div class="stat-value">${shown}</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">最高涵蓋數</div>
      <div class="stat-value">${maxCovEtf} / ${ETF_CARDS.length}</div>
      ${maxCovRow ? `<div class="stat-sub">${maxCovRow.name}</div>` : ''}
    </div>
    <div class="stat-item">
      <div class="stat-label">概估涉及總資金</div>
      <div class="stat-value" style="font-size:16px">${formatCapital(totalCap)}</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">有持股資料 ETF</div>
      <div class="stat-value">${etfsWithData} 檔</div>
    </div>
  `;
}

function formatCapital(yi) {
  if (yi >= 10000) return (yi/10000).toFixed(1) + ' 兆';
  if (yi >= 1)     return yi.toFixed(0) + ' 億';
  return yi.toFixed(1) + ' 億';
}

// ── Table rendering ──────────────────────────────────────────────────────
let expandedRow = null;
let activeFilters = new Set();
let sortCol = 'total_capital';
let sortDir = -1;  // -1 = desc

function getFilteredSorted() {
  const minCov = parseInt(document.getElementById('minCoverage').value);
  const q = document.getElementById('search').value.trim().toLowerCase();

  let rows = CROSS_DATA.filter(r => {
    if (r.etf_count < minCov) return false;
    if (q && !r.ticker.toLowerCase().includes(q) && !r.name.toLowerCase().includes(q)) return false;
    if (activeFilters.size > 0) {
      const hasAll = [...activeFilters].every(f =>
        r.etfs.some(e => e.etf_ticker === f)
      );
      if (!hasAll) return false;
    }
    return true;
  });

  rows.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    return va < vb ? sortDir : va > vb ? -sortDir : 0;
  });

  return rows;
}

function renderTable() {
  const rows = getFilteredSorted();
  const tbody = document.getElementById('tableBody');
  expandedRow = null;

  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" class="no-results">查無符合條件的成分股</td></tr>`;
    renderStats([]);
    return;
  }

  tbody.innerHTML = rows.map((r, i) => {
    const dots = r.etfs.map(e =>
      `<div class="dot" style="background:${e.color}" title="${e.etf_ticker} ${e.etf_name}"></div>`
    ).join('');

    const pills = r.etfs.map(e => `
      <span class="etf-pill"
            style="color:${e.color};border-color:color-mix(in srgb,${e.color} 40%,transparent);background:color-mix(in srgb,${e.color} 12%,transparent)">
        ${e.etf_ticker} ${e.weight.toFixed(2)}%
      </span>`).join('');

    const industry = INDUSTRY_MAP[r.ticker] || '其他';

    return `
      <tr onclick="toggleExpand(${i}, '${r.ticker}')" data-idx="${i}">
        <td class="td-num" style="color:var(--text3);font-size:11px">${i+1}</td>
        <td class="td-ticker">${r.ticker}</td>
        <td class="td-name">${r.name}</td>
        <td><span class="industry-tag">${industry}</span></td>
        <td>
          <div class="dot-row">${dots}<span style="font-family:var(--mono);font-size:13px;margin-left:4px;color:var(--text2)">${r.etf_count}</span></div>
        </td>
        <td class="td-num" style="color:var(--accent)">${r.max_weight.toFixed(2)}%</td>
        <td class="td-num" style="color:var(--gold)">${r.total_capital.toFixed(0)}</td>
        <td class="td-num">${r.total_shares > 0 ? r.total_shares.toLocaleString() : '--'}</td>
        <td><div class="etf-pills">${pills}</div></td>
      </tr>
      <tr class="expand-row" id="expand-${i}" style="display:none">
        <td colspan="9"></td>
      </tr>
    `;
  }).join('');

  renderStats(rows);

  // Update sort icons
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
    if (th.dataset.col === sortCol) {
      th.classList.add(sortDir === -1 ? 'sort-desc' : 'sort-asc');
    }
  });
}

function toggleExpand(idx, ticker) {
  const expandTr = document.getElementById(`expand-${idx}`);
  const mainTr   = expandTr.previousElementSibling;

  if (expandedRow === idx) {
    expandTr.style.display = 'none';
    mainTr.classList.remove('expanded');
    expandedRow = null;
    return;
  }

  // Close previous
  if (expandedRow !== null) {
    const prev = document.getElementById(`expand-${expandedRow}`);
    if (prev) {
      prev.style.display = 'none';
      prev.previousElementSibling.classList.remove('expanded');
    }
  }

  // Find data
  const row = CROSS_DATA.find(r => r.ticker === ticker);
  if (!row) return;

  const inner = row.etfs.map(e => `
    <div class="expand-card" style="--ec-color:${e.color}">
      <div class="ec-ticker">${e.etf_ticker}</div>
      <div class="ec-name">${e.etf_name}</div>
      <div class="ec-row"><span>權重</span><span class="ec-val">${e.weight.toFixed(2)}%</span></div>
      <div class="ec-row"><span>資金</span><span class="ec-val">${e.capital_yi} 億</span></div>
      ${e.shares ? `<div class="ec-row"><span>張數</span><span class="ec-val">${Math.round(e.shares/1000).toLocaleString()} 張</span></div>` : ''}
    </div>
  `).join('');

  expandTr.querySelector('td').innerHTML = `<div class="expand-inner">${inner}</div>`;
  expandTr.style.display = '';
  mainTr.classList.add('expanded');
  expandedRow = idx;
}

// ── ETF card filter ──────────────────────────────────────────────────────
function toggleETFFilter(ticker) {
  const card = document.getElementById(`card-${ticker}`);
  if (activeFilters.has(ticker)) {
    activeFilters.delete(ticker);
    card.classList.remove('active');
    card.querySelectorAll('.tag').forEach(t => t.classList.remove('active-tag'));
  } else {
    activeFilters.add(ticker);
    card.classList.add('active');
    card.querySelectorAll('.tag').forEach(t => t.classList.add('active-tag'));
  }
  renderTable();
}

// ── Sort ─────────────────────────────────────────────────────────────────
document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = col === 'ticker' ? 1 : -1; }
    renderTable();
  });
});

// ── Controls ─────────────────────────────────────────────────────────────
document.getElementById('sortBy').addEventListener('change', e => {
  sortCol = e.target.value;
  sortDir = sortCol === 'ticker' ? 1 : -1;
  renderTable();
});
document.getElementById('minCoverage').addEventListener('change', renderTable);
document.getElementById('search').addEventListener('input', renderTable);

// ── Init ─────────────────────────────────────────────────────────────────
renderETFCards();
renderTable();
</script>
