<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patreon 驗證中...</title>
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --text: #e6edf3;
    --text2: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .container {
    text-align: center;
    padding: 20px;
  }

  .spinner {
    width: 48px;
    height: 48px;
    border: 4px solid var(--bg2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin: 0 auto 20px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  h1 {
    font-size: 18px;
    margin-bottom: 8px;
  }

  p {
    font-size: 14px;
    color: var(--text2);
    margin-bottom: 20px;
  }

  .error {
    background: rgba(248, 81, 73, 0.1);
    border: 1px solid var(--red);
    border-radius: 8px;
    padding: 16px;
    margin-top: 20px;
    text-align: left;
  }

  .error h2 {
    color: var(--red);
    font-size: 14px;
    margin-bottom: 8px;
  }

  .error p {
    font-size: 12px;
    color: var(--text2);
    margin: 4px 0;
    font-family: 'Courier New', monospace;
  }

  .success {
    background: rgba(63, 185, 80, 0.1);
    border: 1px solid var(--green);
    border-radius: 8px;
    padding: 16px;
    margin-top: 20px;
  }

  .success h2 {
    color: var(--green);
    font-size: 14px;
    margin-bottom: 8px;
  }

  .action-buttons {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 16px;
  }

  button {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--accent);
    color: var(--bg);
  }

  .btn-primary:hover {
    opacity: 0.9;
  }

  .btn-secondary {
    background: var(--bg2);
    color: var(--accent);
    border: 1px solid var(--accent);
  }

  .btn-secondary:hover {
    background: rgba(88, 166, 255, 0.1);
  }
</style>
</head>
<body>

<div class="container">
  <div class="spinner"></div>
  <h1>驗證 Patreon 會員身份中...</h1>
  <p id="status">正在處理授權，請稍候</p>

  <div id="errorBox" class="error" style="display: none;">
    <h2>❌ 驗證失敗</h2>
    <p id="errorMessage"></p>
    <div class="action-buttons">
      <button class="btn-secondary" onclick="goBack()">返回上一頁</button>
      <button class="btn-primary" onclick="retry()">重試</button>
    </div>
  </div>

  <div id="successBox" class="success" style="display: none;">
    <h2>✅ 驗證成功！</h2>
    <p>恭喜！你已成為創始會員。<br>視窗將在 3 秒後自動關閉。</p>
    <div class="action-buttons">
      <button class="btn-primary" onclick="closeWindow()">立即關閉</button>
      <button class="btn-secondary" onclick="goBack()">返回</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js';
  import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js';
  import { getFunctions, httpsCallable } from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-functions.js';

  // Firebase Config (same as etf_analysis.html)
  const firebaseConfig = {
    apiKey: "AIzaSyA9CJ2FF3DUhmaZxRmKrptU10CSyi9mOfQ",
    authDomain: "etf-analysis-master.firebaseapp.com",
    projectId: "etf-analysis-master",
    storageBucket: "etf-analysis-master.firebasestorage.app",
    messagingSenderId: "447309961676",
    appId: "1:447309961676:web:5f665d92457d471350e569"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const functions = getFunctions(app, 'us-central1');

  let authCode = null;
  let currentUser = null;

  // Extract code from URL
  function getCodeFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get('code');
  }

  // Get redirect URI (current origin + this page)
  function getRedirectUri() {
    return `${window.location.origin}${window.location.pathname}`;
  }

  // Show error UI
  function showError(message) {
    document.getElementById('status').style.display = 'none';
    document.querySelector('.spinner').style.display = 'none';
    document.getElementById('errorBox').style.display = 'block';
    document.getElementById('errorMessage').textContent = message;
  }

  // Show success UI
  function showSuccess() {
    document.getElementById('status').style.display = 'none';
    document.querySelector('.spinner').style.display = 'none';
    document.getElementById('successBox').style.display = 'block';

    // Auto-close after 3 seconds
    setTimeout(closeWindow, 3000);
  }

  // Close window (if opened by popup)
  window.closeWindow = function() {
    // Try to close the window
    if (window.opener) {
      // Notify parent window
      window.opener.postMessage({
        type: 'patreon_verified',
        success: true,
        tier: 'founders'
      }, '*');
    }
    window.close();
  };

  // Go back to previous page
  window.goBack = function() {
    if (window.opener) {
      window.opener.focus();
      window.close();
    } else {
      window.history.back();
    }
  };

  // Retry verification
  window.retry = function() {
    if (authCode) {
      verifyPatreon();
    } else {
      window.location.reload();
    }
  };

  // Main verification function
  async function verifyPatreon() {
    try {
      // Check if user is authenticated
      if (!currentUser) {
        showError('用戶未登入。請先登入後重試。');
        return;
      }

      if (!authCode) {
        showError('缺少授權碼。請從 Patreon 重新授權。');
        return;
      }

      document.getElementById('status').textContent = '驗證中... 0/3';

      // Call Firebase Cloud Function
      const linkPatreon = httpsCallable(functions, 'linkPatreon');

      document.getElementById('status').textContent = '驗證中... 1/3';

      const result = await linkPatreon({
        code: authCode,
        redirectUri: getRedirectUri()
      });

      document.getElementById('status').textContent = '驗證中... 2/3';

      console.log('Verification result:', result.data);

      document.getElementById('status').textContent = '驗證中... 3/3';

      if (result.data.success) {
        showSuccess();
      } else {
        showError('驗證失敗，請重試。');
      }
    } catch (error) {
      console.error('Verification error:', error);

      let errorMsg = '驗證過程中發生錯誤';
      if (error.code === 'functions/unauthenticated') {
        errorMsg = '用戶未登入，無法驗證。';
      } else if (error.code === 'functions/permission-denied') {
        errorMsg = '用戶不是 Patreon 贊助者，或訂閱已過期。';
      } else if (error.code === 'functions/resource-exhausted') {
        errorMsg = '創始會員名額已滿，請加入等候名單。';
      } else if (error.message) {
        errorMsg = error.message;
      }

      showError(errorMsg);
    }
  }

  // Check auth state and start verification
  onAuthStateChanged(auth, (user) => {
    currentUser = user;

    if (!user) {
      showError('您需要登入才能驗證 Patreon 會員身份。請返回主頁面並登入。');
      return;
    }

    authCode = getCodeFromUrl();
    if (!authCode) {
      showError('缺少 OAuth2 授權碼，無法驗證。');
      return;
    }

    // All conditions met, start verification
    verifyPatreon();
  });
</script>

</body>
</html>
