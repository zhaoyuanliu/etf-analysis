<!DOCTYPE html>
<html lang="zh-TW">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣 ETF 成分股交叉分析</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d1117;
    --bg2:       #161b22;
    --bg3:       #1f2937;
    --border:    #30363d;
    --border2:   #21262d;
    --text:      #e6edf3;
    --text2:     #8b949e;
    --text3:     #6e7681;
    --accent:    #58a6ff;
    --green:     #3fb950;
    --red:       #f85149;
    --gold:      #d29922;
    --radius:    10px;
    --radius-lg: 16px;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Noto Sans TC', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(180deg, #0d1117 0%, #161b22 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 24px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(88,166,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .header h1 {
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
    position: relative;
  }
  .header h1 span { color: var(--accent); }
  .header-sub {
    margin-top: 8px;
    font-size: 13px;
    color: var(--text2);
    position: relative;
  }
  .header-sub b { color: var(--text); }

  /* ── Top-level page tab navigation ── */
  .tab-nav {
    display: flex;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 4px;
  }
  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    color: var(--text2);
    padding: 13px 20px;
    font-size: 14px;
    font-family: var(--sans);
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
    font-weight: 500;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ── Layout ── */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 20px;
  }

  /* ── Section titles ── */
  .section-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 14px;
    padding-left: 2px;
  }

  /* ── ETF Cards grid ── */
  .etf-grid {
    margin-bottom: 32px;
  }
  .etf-group {
    margin-bottom: 28px;
  }
  .etf-group-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 12px;
    padding: 0 2px;
    border-left: 3px solid var(--border);
    padding-left: 12px;
  }
  .etf-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }
  .etf-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .etf-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--card-color, var(--accent));
    border-radius: 2px 2px 0 0;
  }
  .etf-card:hover {
    border-color: var(--card-color, var(--accent));
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .etf-card.active {
    border-color: var(--card-color, var(--accent));
    background: color-mix(in srgb, var(--card-color, var(--accent)) 8%, var(--bg2));
  }
  .card-ticker {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
    color: var(--card-color, var(--accent));
    margin-bottom: 2px;
  }
  .card-name {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 10px;
    line-height: 1.3;
  }
  .card-aum {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
  }
  .tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 20px;
    background: rgba(255,255,255,0.07);
    color: var(--text2);
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  .tag.active-tag {
    background: color-mix(in srgb, var(--card-color) 20%, transparent);
    color: var(--card-color, var(--accent));
    border-color: color-mix(in srgb, var(--card-color) 40%, transparent);
  }

  /* ── My Portfolio — empty card ── */
  .portfolio-card-empty {
    background: var(--bg2);
    border: 1px dashed color-mix(in srgb, var(--accent) 35%, var(--border));
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    min-height: 120px;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .portfolio-card-empty::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), #a78bfa);
    border-radius: 2px 2px 0 0;
  }
  .portfolio-card-empty:hover {
    border-color: var(--accent);
    background: color-mix(in srgb, var(--accent) 5%, var(--bg2));
  }
  .pce-plus  { font-size: 22px; color: var(--accent); opacity: 0.7; line-height: 1; }
  .pce-label { font-size: 12px; color: var(--text3); }

  /* ── My Portfolio — modal ── */
  .portfolio-modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(3px);
  }
  .portfolio-modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    width: min(520px, calc(100vw - 32px));
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  }
  .portfolio-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
  }
  .portfolio-modal-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .portfolio-modal-close {
    background: none;
    border: none;
    color: var(--text3);
    font-size: 20px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }
  .portfolio-modal-close:hover { color: var(--text); }
  .portfolio-modal-body {
    padding: 16px 20px;
    overflow-y: auto;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .portfolio-search-wrap { position: relative; }
  .portfolio-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    font-family: var(--sans);
  }
  .portfolio-input:focus { border-color: var(--accent); }
  .portfolio-dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 600;
    display: none;
    box-shadow: 0 8px 28px rgba(0,0,0,0.4);
  }
  .portfolio-dropdown.show { display: block; }
  .portfolio-dropdown-item {
    padding: 8px 12px;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    gap: 10px;
    align-items: baseline;
    border-bottom: 1px solid var(--border2);
  }
  .portfolio-dropdown-item:last-child { border-bottom: none; }
  .portfolio-dropdown-item:hover,
  .portfolio-dropdown-item.highlighted { background: var(--bg2); }
  .portfolio-modal-chips-label {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 6px;
  }
  .portfolio-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .portfolio-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: color-mix(in srgb, var(--accent) 12%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
    border-radius: 20px;
    padding: 3px 9px 3px 8px;
    font-size: 11px;
    color: var(--accent);
    font-family: var(--mono);
  }
  .portfolio-chip-name {
    font-size: 10px;
    color: var(--text3);
    font-family: var(--sans);
  }
  .portfolio-chip-x {
    cursor: pointer;
    opacity: 0.5;
    font-size: 14px;
    line-height: 1;
    margin-left: 2px;
    font-family: var(--sans);
  }
  .portfolio-chip-x:hover { opacity: 1; color: var(--red); }
  .portfolio-modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
  }
  .portfolio-btn-cancel {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text2);
    font-size: 13px;
    padding: 7px 16px;
    cursor: pointer;
    font-family: var(--sans);
  }
  .portfolio-btn-cancel:hover { border-color: var(--text2); }
  .portfolio-btn-save {
    background: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 7px;
    color: #0d1117;
    font-size: 13px;
    padding: 7px 18px;
    cursor: pointer;
    font-family: var(--sans);
    font-weight: 600;
  }
  .portfolio-btn-save:hover { opacity: 0.88; }
  .portfolio-badge {
    display: inline-block;
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 10px;
    background: color-mix(in srgb, var(--accent) 15%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
    color: var(--accent);
    margin-left: 4px;
    vertical-align: middle;
    font-family: var(--mono);
    letter-spacing: 0.3px;
  }

  /* ── Stats bar ── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
    margin-bottom: 28px;
  }
  .stat-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    text-align: center;
  }
  .stat-label {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
    color: var(--accent);
  }
  .stat-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    margin-bottom: 16px;
  }
  .controls label {
    font-size: 12px;
    color: var(--text2);
    white-space: nowrap;
  }
  select, input[type=text] {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: var(--sans);
    outline: none;
    transition: border-color 0.2s;
  }
  select:focus, input[type=text]:focus {
    border-color: var(--accent);
  }
  input[type=text] {
    min-width: 180px;
  }
  input[type=text]::placeholder { color: var(--text3); }

  /* ── Table ── */
  .table-wrap {
    overflow-x: auto;
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    background: var(--bg3);
    padding: 11px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text3);
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    position: sticky;
    top: 0;
    z-index: 2;
  }
  thead th:hover { color: var(--text); }
  thead th .sort-icon { margin-left: 4px; opacity: 0.4; }
  thead th.sort-asc .sort-icon::after { content: '↑'; opacity: 1; }
  thead th.sort-desc .sort-icon::after { content: '↓'; opacity: 1; }

  tbody tr {
    border-bottom: 1px solid var(--border2);
    transition: background 0.1s;
    cursor: pointer;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg3); }
  tbody tr.expanded { background: rgba(88,166,255,0.04); }

  td {
    padding: 10px 14px;
    vertical-align: middle;
  }
  .td-num {
    font-family: var(--mono);
    text-align: right;
  }
  .td-ticker {
    font-family: var(--mono);
    font-weight: 600;
    color: var(--accent);
    font-size: 14px;
  }
  .td-name {
    font-weight: 500;
  }
  .stock-link {
    color: inherit;
    text-decoration: none;
    position: relative;
  }
  .stock-link::after {
    content: ' ↗';
    font-size: 10px;
    opacity: 0;
    color: var(--accent);
    transition: opacity 0.15s;
  }
  .stock-link:hover::after {
    opacity: 1;
  }

  .dot-row {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .etf-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .etf-pill {
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid;
    white-space: nowrap;
    cursor: default;
  }

  /* ── Expanded row ── */
  .expand-row td {
    padding: 0;
    background: #0d1117;
    border-bottom: 2px solid var(--border);
  }
  .expand-inner {
    padding: 16px 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .expand-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--ec-color, var(--accent));
    border-radius: 8px;
    padding: 12px 14px;
  }
  .ec-ticker {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    color: var(--ec-color, var(--accent));
    margin-bottom: 2px;
  }
  .ec-name { font-size: 11px; color: var(--text2); margin-bottom: 8px; }
  .ec-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text2);
    margin-top: 3px;
  }
  .ec-val {
    font-family: var(--mono);
    color: var(--text);
    font-size: 12px;
  }

  .no-results {
    text-align: center;
    padding: 48px;
    color: var(--text3);
    font-size: 14px;
  }

  /* ── Progress bar for weight ── */
  .weight-bar-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 120px;
  }
  .weight-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    flex: 1;
    overflow: hidden;
  }
  .weight-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
  }
  .weight-val {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
    min-width: 48px;
    text-align: right;
  }
  .industry-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    background: rgba(255,255,255,0.06);
    color: var(--text2);
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  /* ══════════════════════════════════════════
     History page styles
  ══════════════════════════════════════════ */

  .history-split {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 20px;
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 20px;
  }
  @media (max-width: 900px) {
    .history-split { grid-template-columns: 1fr; }
  }
  .history-wall-panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    align-self: start;
  }
  .history-wall-panel .section-title {
    margin-bottom: 12px;
  }
  .wall-empty {
    font-size: 12px;
    color: var(--text3);
    padding: 16px 4px;
    text-align: center;
  }
  .wall-group {
    margin-bottom: 22px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border2);
  }
  .wall-group:last-child { border-bottom: none; margin-bottom: 0; }

  .wall-group-date {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    padding: 4px 0 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.5px;
  }
  .wall-group-date .arrow { color: var(--text3); font-weight: 400; }

  .wall-section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin: 12px 0 6px;
  }
  .wall-section-label:first-of-type { margin-top: 0; }
  .wall-add-label { color: var(--green); }
  .wall-rem-label { color: var(--red); }

  /* Stock card — colored left border, dark fill */
  .wall-stock-card {
    background: color-mix(in srgb, var(--bg) 55%, var(--bg3));
    border: 1px solid var(--border2);
    border-left: 3px solid var(--wsc, var(--border));
    border-radius: 8px;
    padding: 9px 12px;
    margin-bottom: 6px;
  }
  .wall-stock-card-add { --wsc: var(--green); }
  .wall-stock-card-rem { --wsc: var(--red);   }

  .wall-stock-header {
    display: flex;
    align-items: baseline;
    gap: 7px;
    margin-bottom: 6px;
  }
  .wall-stock-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }
  .wall-stock-ticker {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
  }

  /* ETF row inside card */
  .wall-etf-row {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 2px 0;
  }
  .wall-etf-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--wc, var(--accent));
    flex-shrink: 0;
  }
  .wall-etf-code {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--wc, var(--accent));
    white-space: nowrap;
  }
  .wall-etf-name {
    font-size: 11px;
    color: var(--text3);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .wall-etf-shares {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
    padding-left: 6px;
  }
  .wall-shares-add { color: var(--green); }

  .cpill-rem { background: rgba(248,81,73,0.15);  color: var(--red);    border: 1px solid rgba(248,81,73,0.3); }

  .change-body { padding: 20px; }

  .cs-label {
    font-size: 11px;
    font-weight: 600;

    margin-top: 20px;

  .cs-label-add  { color: var(--green); }
  .cs-label-rem  { color: var(--red); }
  .cs-label-chg  { color: var(--accent); }
  .cs-label-hold { color: var(--text3); }

  .ci-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 8px;
    margin-bottom: 4px;
  }
  .ci-card {
    background: var(--bg3);
    border-radius: 8px;
    padding: 11px 14px;
    border-left: 3px solid transparent;
  }
  .ci-card-add { border-color: var(--green); }
  .ci-card-rem { border-color: var(--red);   opacity: 0.7; }
  .ci-card-up  { border-color: var(--green); }
  .ci-card-dn  { border-color: #fb923c; }

  .ci-ticker {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .ci-name { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .ci-weight { font-size: 12px; color: var(--text2); }
  .ci-weight span { font-family: var(--mono); color: var(--text); }
  .ci-badge {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    margin-left: 5px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .ci-badge-new { background: rgba(63,185,80,0.2);  color: var(--green); }
  .ci-badge-out { background: rgba(248,81,73,0.2);  color: var(--red); }
  .ci-reason {
    font-size: 11px;
    color: var(--text3);
    margin-top: 7px;
    line-height: 1.55;
  }
  .ci-wchange {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: var(--mono);
    font-size: 12px;
    flex-wrap: wrap;
  }

  /* Holdings after change */
  .holdings-after-section {
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid var(--border2);
  }
  .holdings-after-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 6px;
    margin-top: 10px;
  }
  .ha-item {
    background: var(--bg3);
    border-radius: 8px;
    padding: 9px 12px;
    border: 1px solid var(--border2);
    position: relative;
    transition: border-color 0.2s;
  }
  .ha-item.new-entry {
    border-color: rgba(63,185,80,0.45);
    background: rgba(63,185,80,0.05);
  }
  .ha-ticker {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
  }
  .ha-ticker.new-c { color: var(--green); }
  .ha-name  { font-size: 11px; color: var(--text2); margin: 2px 0 4px; }
  .ha-weight {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .ha-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 5px;
    overflow: hidden;
  }
  .ha-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s;
  }
  .new-badge-sm {
    position: absolute;
    top: 6px; right: 8px;
    font-size: 9px;
    padding: 1px 5px;
    background: rgba(63,185,80,0.2);
    color: var(--green);
    border-radius: 3px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  /* Demo notice */
  .demo-notice {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    background: rgba(250,204,21,0.08);
    color: #facc15;
    border: 1px solid rgba(250,204,21,0.25);
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 20px;
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 32px 20px;
    font-size: 11px;
    color: var(--text3);
    border-top: 1px solid var(--border2);
    margin-top: 40px;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  /* ── Auth UI ── */
  .auth-area {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0;
  }
  #authArea {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 8px 8px 4px;
  }
  .btn-login {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 13px;
    font-family: var(--sans);
    padding: 6px 14px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .btn-login:hover { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, var(--bg3)); }
  .user-info { display: flex; align-items: center; gap: 8px; }
  .user-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    border: 1px solid var(--border); object-fit: cover;
  }
  .user-avatar-fallback {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--accent); display: flex;
    align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: #fff; flex-shrink: 0;
  }
  .user-name {
    font-size: 13px; color: var(--text);
    max-width: 120px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }
  .btn-logout {
    background: none; border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text3);
    font-size: 12px; font-family: var(--sans);
    padding: 5px 10px; cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .btn-logout:hover { color: var(--red); border-color: var(--red); }

  /* ── Notes page ── */
  .notes-page { max-width: 800px; margin: 0 auto; padding: 24px 20px; }
  .notes-login-prompt {
    text-align: center; padding: 80px 20px;
    color: var(--text3); font-size: 15px;
  }
  .notes-input-area {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 16px; margin-bottom: 24px;
  }
  .notes-textarea {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-size: 14px;
    font-family: var(--sans); padding: 12px; resize: vertical;
    min-height: 80px; outline: none; transition: border-color 0.2s; line-height: 1.6;
  }
  .notes-textarea:focus { border-color: var(--accent); }
  .notes-textarea::placeholder { color: var(--text3); }
  .notes-input-footer {
    display: flex; justify-content: space-between; align-items: center; margin-top: 10px;
  }
  .notes-counter { font-size: 12px; color: var(--text3); }
  .notes-counter.warn { color: var(--gold); }
  .notes-counter.full { color: var(--red); }
  .btn-submit-note {
    background: var(--accent); border: none; border-radius: var(--radius);
    color: #fff; font-size: 13px; font-family: var(--sans); font-weight: 600;
    padding: 8px 20px; cursor: pointer; transition: opacity 0.2s;
  }
  .btn-submit-note:hover { opacity: 0.85; }
  .btn-submit-note:disabled { opacity: 0.4; cursor: not-allowed; }
  .notes-guest-prompt {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 16px 20px;
    margin-bottom: 24px; font-size: 13px; color: var(--text2);
    display: flex; align-items: center; gap: 10px;
  }
  .notes-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
    align-items: start;
  }
  .note-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
  }
  .note-card.own { border-color: color-mix(in srgb, var(--accent) 30%, var(--border)); }
  .note-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .note-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid var(--border); object-fit: cover; flex-shrink: 0;
  }
  .note-avatar-fallback {
    width: 28px; height: 28px; border-radius: 50%; background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: #fff; flex-shrink: 0;
  }
  .note-meta { flex: 1; min-width: 0; }
  .note-author { font-size: 13px; font-weight: 600; color: var(--text); }
  .note-time { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .note-content {
    font-size: 14px; color: var(--text); line-height: 1.65;
    white-space: pre-wrap; word-break: break-word;
  }
  .btn-delete-note {
    background: none; border: none; color: var(--text3); font-size: 12px;
    cursor: pointer; padding: 4px 8px; border-radius: 6px;
    transition: color 0.2s, background 0.2s; flex-shrink: 0;
  }
  .btn-delete-note:hover { color: var(--red); background: rgba(248,81,73,0.1); }
  .notes-empty { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; }
  .notes-section-title {
    font-size: 11px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase;
    color: var(--text3); margin-bottom: 14px; padding-left: 2px;
  }
  /* ── Notes input header ── */
  #notesInputHeader {
    background: linear-gradient(180deg, #0d1117 0%, #161b22 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
  }
  .notes-header-inner { max-width: 800px; margin: 0 auto; }
  #notesInputHeader .notes-input-area { margin-bottom: 0; }
  #notesInputHeader .notes-guest-prompt {
    margin: 0; border: none; background: none;
    justify-content: center; padding: 8px 0;
  }

  /* ── Announcement modal ─────────────────────────────────────────── */
  .ann-modal {
    position: fixed; inset: 0; z-index: 10000;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .ann-modal.show { opacity: 1; pointer-events: auto; }
  .ann-backdrop {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .ann-card {
    position: relative;
    background: linear-gradient(180deg, var(--bg2) 0%, var(--bg3) 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 32px 36px 28px;
    max-width: 480px; width: calc(100% - 40px);
    box-shadow: 0 24px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(88,166,255,0.15);
    transform: translateY(14px) scale(0.97);
    transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
  }
  .ann-modal.show .ann-card { transform: translateY(0) scale(1); }
  .ann-close {
    position: absolute; top: 10px; right: 12px;
    width: 32px; height: 32px;
    border: none; background: transparent;
    color: var(--text2); cursor: pointer;
    font-size: 22px; line-height: 1;
    border-radius: 50%;
    transition: background 0.15s, color 0.15s;
  }
  .ann-close:hover { background: var(--bg3); color: var(--text); }
  .ann-icon {
    font-size: 40px; text-align: center;
    margin-bottom: 6px;
  }
  .ann-title {
    text-align: center;
    font-size: 20px; font-weight: 700;
    color: var(--text);
    margin-bottom: 14px;
  }
  .ann-body {
    color: var(--text);
    font-size: 14.5px; line-height: 1.75;
    margin-bottom: 22px;
  }
  .ann-body b { color: var(--accent); }
  .ann-body p { margin-bottom: 4px; }
  .ann-body .ann-sub { color: var(--text2); font-size: 13px; margin-top: 10px; }
  .ann-ok {
    display: block; width: 100%;
    background: var(--accent); color: #0d1117;
    border: none; padding: 10px 20px;
    border-radius: 8px;
    font-family: var(--sans);
    font-weight: 600; font-size: 14px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .ann-ok:hover { background: #79b8ff; transform: translateY(-1px); }
  .ann-ok:active { transform: translateY(0); }

  /* ── 情有獨鍾 section ── */
  .unique-section {
    margin-bottom: 24px;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .unique-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--bg2);
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid transparent;
  }
  .unique-section-header:hover { background: var(--bg3); }
  .unique-section.open .unique-section-header { border-bottom-color: var(--border); }
  .unique-count-badge {
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    background: rgba(88,166,255,0.12);
    color: var(--accent);
    border: 1px solid rgba(88,166,255,0.3);
    font-weight: 600;
  }
  #uniqueTable thead th { top: unset; position: relative; }
</style>
</head>

<!-- ── Sticky page tab navigation ─────────────────────────────────────── -->

     Page 1 — ETF 一覽
══════════════════════════════════════════════════════════════════════ -->

// ── Page switching ────────────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => { p.style.display = 'none'; });
  document.getElementById('page-' + name).style.display = '';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  const isNotes = name === 'notes';
  document.getElementById('mainHeader').style.display        = isNotes ? 'none' : '';
  document.getElementById('notesInputHeader').style.display  = isNotes ? '' : 'none';
  if (name === 'history') {
    renderHistoryWall();
    renderHistoryETFTabs();
    renderHistoryContent();
  }
  if (isNotes && typeof window.onNotesPageOpen === 'function') {
    window.onNotesPageOpen();
  }
}

// ── Render ETF overview cards ─────────────────────────────────────────────
function renderETFCards() {
  const grid = document.getElementById('etfGrid');
  const passive = ETF_CARDS.filter(e => e.type === 'passive');
  const active  = ETF_CARDS.filter(e => e.type === 'active');

  const etfCardHtml = (e) => `
    <div class="etf-card" style="--card-color:${e.color}"
         onclick="toggleETFFilter('${e.ticker}')" id="card-${e.ticker}">
      <div class="card-ticker">${e.ticker}</div>
      <div class="card-name">${e.name}${e.date ? `<span style="color:var(--text3);font-size:10px;margin-left:4px">(${e.date})</span>` : ''}</div>
      <div class="card-aum">${e.aum}</div>
      <div class="card-tags">${e.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    </div>`;

  const portfolioCardHtml = () => {
    if (myPortfolio.size === 0) {
      return `
        <div class="portfolio-card-empty" onclick="openPortfolioModal()">
          <div class="pce-plus">+</div>
          <div class="pce-label">新增持股</div>
        </div>`;
    }
    const tickers = [...myPortfolio];
    const shown   = tickers.slice(0, 4).map(c => `<span class="tag">${c}</span>`).join('');
    const more    = tickers.length > 4 ? `<span class="tag">+${tickers.length - 4}</span>` : '';
    return `
      <div class="etf-card" id="card-MY_PORTFOLIO"
           style="--card-color:#58a6ff" onclick="togglePortfolioFilter()">
        <div class="card-ticker" style="display:flex;justify-content:space-between;align-items:flex-start">
          <span>我的持股</span>
          <button style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:0;line-height:1;opacity:0.6"
                  onclick="event.stopPropagation();openPortfolioModal()" title="編輯持股">✎</button>
        </div>
        <div class="card-name">${tickers.length} 檔自選股</div>
        <div class="card-aum" style="font-size:18px">${tickers.length} 檔</div>
        <div class="card-tags">${shown}${more}</div>
      </div>`;
  };

  const renderGroup = (title, cards, extra = '') => `
    <div class="etf-group">
      <div class="etf-group-title">${title}</div>
      <div class="etf-cards">
        ${cards.map(etfCardHtml).join('')}
        ${extra}
      </div>
    </div>`;

  grid.innerHTML =
    (passive.length ? renderGroup('被動式', passive) : '') +
    (active.length  ? renderGroup('主動式', active, portfolioCardHtml()) : '');
}

// ── Render stats bar ──────────────────────────────────────────────────────
function renderStats(rows) {
  const bar = document.getElementById('statsBar');
  const shown      = rows.length;
  const maxCovEtf  = rows.reduce((m,r) => Math.max(m, r.etf_count), 0);
  const maxCovRow  = rows.find(r => r.etf_count === maxCovEtf);
  const totalCap   = rows.reduce((s,r) => s + r.total_capital, 0);
  const etfsWithData = ETF_CARDS.filter(e =>
    CROSS_DATA.some(r => r.etfs.some(x => x.etf_ticker === e.ticker))
  ).length;

  bar.innerHTML = `
    <div class="stat-item">
      <div class="stat-label">顯示成分股</div>
      <div class="stat-value">${shown}</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">最高涵蓋數</div>

function formatCapital(yi) {
  if (yi >= 10000) return (yi/10000).toFixed(1) + ' 兆';
  if (yi >= 1)     return yi.toFixed(0) + ' 億';
  return yi.toFixed(1) + ' 億';
}

// ── Table rendering ───────────────────────────────────────────────────────
let expandedRow = null;
let activeFilters = new Set();
let sortCol = 'total_capital';
let sortDir = -1;

function getFilteredSorted() {
  const minCov = parseInt(document.getElementById('minCoverage').value);
  const q = document.getElementById('search').value.trim().toLowerCase();

  const hasPortfolioFilter = activeFilters.has('MY_PORTFOLIO');
  const etfFilters = new Set([...activeFilters].filter(f => f !== 'MY_PORTFOLIO'));

  let rows = CROSS_DATA.filter(r => {
    if (hasPortfolioFilter && myPortfolio.size > 0) {
      if (!myPortfolio.has(r.ticker)) return false;
    } else if (!hasPortfolioFilter) {
      if (r.etf_count < minCov) return false;
    }
    if (q && !r.ticker.toLowerCase().includes(q) && !r.name.toLowerCase().includes(q)) return false;
    if (etfFilters.size > 0) {
      const hasAll = [...etfFilters].every(f =>
        r.etfs.some(e => e.etf_ticker === f)
      );
      if (!hasAll) return false;
    }
    return true;
  });

  rows.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    return va < vb ? -sortDir : va > vb ? sortDir : 0;
  });

  return rows;
}

function renderTable() {
  const rows = getFilteredSorted();
  const tbody = document.getElementById('tableBody');
  expandedRow = null;

  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="9" class="no-results">查無符合條件的成分股</td></tr>`;
    renderStats([]);
    return;
  }

  tbody.innerHTML = rows.map((r, i) => {
    const isMyStock = myPortfolio.has(r.ticker);

    const dots = r.etfs.map(e =>
      `<div class="dot" style="background:${e.color}" title="${e.etf_ticker} ${e.etf_name}"></div>`
    ).join('');

    const pills = r.etfs.map(e => `
      <span class="etf-pill"
            style="color:${e.color};border-color:color-mix(in srgb,${e.color} 40%,transparent);background:color-mix(in srgb,${e.color} 12%,transparent)">
        ${e.etf_ticker} ${e.weight.toFixed(2)}%
      </span>`).join('');

    const industry = INDUSTRY_MAP[r.ticker] || '其他';

    return `
      <tr onclick="toggleExpand(${i}, '${r.ticker}')" data-idx="${i}">
        <td class="td-num" style="color:var(--text3);font-size:11px">${i+1}</td>
        <td class="td-ticker"><a class="stock-link" href="https://www.wantgoo.com/stock/${r.ticker}/technical-chart" target="_blank" rel="noopener" onclick="event.stopPropagation()">${r.ticker}</a></td>
        <td class="td-name"><a class="stock-link" href="https://www.wantgoo.com/stock/${r.ticker}/technical-chart" target="_blank" rel="noopener" onclick="event.stopPropagation()">${r.name}</a>${isMyStock ? '<span class="portfolio-badge">持股</span>' : ''}</td>
        <td><span class="industry-tag">${industry}</span></td>
        <td>
          <div class="dot-row">${dots}<span style="font-family:var(--mono);font-size:13px;margin-left:4px;color:var(--text2)">${r.etf_count}</span></div>
        </td>
        <td class="td-num" style="color:var(--accent)">${r.max_weight.toFixed(2)}%</td>
        <td class="td-num" style="color:var(--gold)">${r.total_capital.toFixed(0)}</td>
        <td class="td-num">${r.total_shares > 0 ? r.total_shares.toLocaleString() : '--'}</td>
        <td><div class="etf-pills">${pills}</div></td>
      </tr>
      <tr class="expand-row" id="expand-${i}" style="display:none">
        <td colspan="9"></td>
      </tr>
    `;
  }).join('');

  renderStats(rows);

  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
    if (th.dataset.col === sortCol) {
      th.classList.add(sortDir === -1 ? 'sort-desc' : 'sort-asc');
    }
  });
}

function toggleExpand(idx, ticker) {
  const expandTr = document.getElementById(`expand-${idx}`);
  const mainTr   = expandTr.previousElementSibling;

  if (expandedRow === idx) {
    expandTr.style.display = 'none';
    mainTr.classList.remove('expanded');
    expandedRow = null;
    return;
  }

  if (expandedRow !== null) {
    const prev = document.getElementById(`expand-${expandedRow}`);
    if (prev) {
      prev.style.display = 'none';
      prev.previousElementSibling.classList.remove('expanded');
    }
  }

  const row = CROSS_DATA.find(r => r.ticker === ticker);
  if (!row) return;

  const inner = row.etfs.map(e => `
    <div class="expand-card" style="--ec-color:${e.color}">
      <div class="ec-ticker">${e.etf_ticker}</div>
      <div class="ec-name">${e.etf_name}</div>
      <div class="ec-row"><span>權重</span><span class="ec-val">${e.weight.toFixed(2)}%</span></div>
      <div class="ec-row"><span>資金</span><span class="ec-val">${e.capital_yi} 億</span></div>
      ${e.shares ? `<div class="ec-row"><span>張數</span><span class="ec-val">${Math.round(e.shares/1000).toLocaleString()} 張</span></div>` : ''}
    </div>
  `).join('');

  expandTr.querySelector('td').innerHTML = `<div class="expand-inner">${inner}</div>`;
  expandTr.style.display = '';
  mainTr.classList.add('expanded');
  expandedRow = idx;
}

// ── ETF card filter ───────────────────────────────────────────────────────
function toggleETFFilter(ticker) {
  const card = document.getElementById(`card-${ticker}`);
  if (activeFilters.has(ticker)) {
    activeFilters.delete(ticker);
    card.classList.remove('active');
    card.querySelectorAll('.tag').forEach(t => t.classList.remove('active-tag'));
  } else {
    activeFilters.add(ticker);
    card.classList.add('active');
    card.querySelectorAll('.tag').forEach(t => t.classList.add('active-tag'));
  }
  renderTable();
  renderUniqueTable();
}

// ── Sort ──────────────────────────────────────────────────────────────────
document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = col === 'ticker' ? 1 : -1; }
    renderTable();
  });
});

document.getElementById('minCoverage').addEventListener('change', renderTable);
document.getElementById('search').addEventListener('input', renderTable);

}

// ── Portfolio Modal ───────────────────────────────────────────────────────
let _tempPortfolio = new Set();
let _ddItems = [], _ddIdx = -1;

function openPortfolioModal() {
  _tempPortfolio = new Set(myPortfolio);
  document.getElementById('modalInput').value = '';
  document.getElementById('modalDropdown').classList.remove('show');
  renderModalChips();
  document.getElementById('portfolioModal').style.display = '';
  setTimeout(() => document.getElementById('modalInput').focus(), 50);
}

function closePortfolioModal() {
  document.getElementById('portfolioModal').style.display = 'none';
}

function savePortfolioModal() {
  myPortfolio = new Set(_tempPortfolio);
  savePortfolio();
  if (activeFilters.has('MY_PORTFOLIO') && myPortfolio.size === 0) activeFilters.delete('MY_PORTFOLIO');
  closePortfolioModal();
  renderETFCards();
  restoreCardActiveStates();
  renderTable();
  renderUniqueTable();
}

function renderModalChips() {
  const wrap = document.getElementById('modalChips');
  if (!wrap) return;
  if (_tempPortfolio.size === 0) {
    wrap.innerHTML = '<div style="color:var(--text3);font-size:12px;padding:4px 0">尚未新增任何持股</div>';
    return;
  }
  wrap.innerHTML = [..._tempPortfolio].map(code => {
    const name = STOCK_NAME[code] || '';
    return `<span class="portfolio-chip">
      ${code}${name ? `<span class="portfolio-chip-name">&nbsp;${name}</span>` : ''}
      <span class="portfolio-chip-x" onclick="removeTempStock('${code}')">×</span>
    </span>`;
  }).join('');
}

function removeTempStock(code) {
  _tempPortfolio.delete(code);
  renderModalChips();
}

function onPortfolioInput(q) {
  q = q.trim().toLowerCase();
  const dd = document.getElementById('modalDropdown');
  if (!q) { dd.classList.remove('show'); return; }

  _ddItems = STOCK_LIST.filter(([code, name]) =>
    code.startsWith(q) || name.includes(q)
  ).slice(0, 12);

  if (!_ddItems.length) { dd.classList.remove('show'); return; }

  _ddIdx = -1;
  dd.innerHTML = _ddItems.map(([code, name, industry], i) => `
    <div class="portfolio-dropdown-item" data-i="${i}" onmousedown="selectModalItem(${i})">
      <span style="font-family:var(--mono);color:var(--accent);min-width:40px">${code}</span>
      <span style="color:var(--text2)">${name}</span>
      ${industry ? `<span style="color:var(--text3);font-size:10px;margin-left:auto">${industry}</span>` : ''}
    </div>`).join('');
  dd.classList.add('show');
}

function onPortfolioKeydown(e) {
  const dd = document.getElementById('modalDropdown');
  if (!dd.classList.contains('show')) return;
  const items = dd.querySelectorAll('.portfolio-dropdown-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    _ddIdx = Math.min(_ddIdx + 1, _ddItems.length - 1);
    items.forEach((el, i) => el.classList.toggle('highlighted', i === _ddIdx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    _ddIdx = Math.max(_ddIdx - 1, -1);
    items.forEach((el, i) => el.classList.toggle('highlighted', i === _ddIdx));
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (_ddIdx >= 0) selectModalItem(_ddIdx);
    else if (_ddItems.length === 1) selectModalItem(0);
  } else if (e.key === 'Escape') {
    closePortfolioModal();
  }
}

function selectModalItem(i) {
  const [code] = _ddItems[i];
  if (!_tempPortfolio.has(code)) {
    _tempPortfolio.add(code);
    renderModalChips();
  }
  const inp = document.getElementById('modalInput');
  inp.value = '';
  document.getElementById('modalDropdown').classList.remove('show');
  inp.focus();
}

// ── Init ──────────────────────────────────────────────────────────────────
renderETFCards();
renderUniqueTable();
renderTable();
if (HISTORY_DATA.length > 0) {
  updateHistoryDesc();
}
</script>

<!-- ── Firebase Auth + Firestore ── -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
  import { getFirestore, collection, addDoc, deleteDoc, doc, query, orderBy, onSnapshot, where, getDocs }
    from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA9CJ2FF3DUhmaZxRmKrptU10CSyi9mOfQ",
    authDomain: "etf-analysis-master.firebaseapp.com",
    projectId: "etf-analysis-master",
    storageBucket: "etf-analysis-master.firebasestorage.app",
    messagingSenderId: "447309961676",
    appId: "1:447309961676:web:5f665d92457d471350e569"
  };

  const app      = initializeApp(firebaseConfig);
  const auth     = getAuth(app);
  const db       = getFirestore(app);
  const provider = new GoogleAuthProvider();
  const authArea = document.getElementById('authArea');

  const NOTES_COL  = collection(db, 'notes');
  const MAX_NOTES  = 15;
  let   currentUser = null;
  let   unsubNotes  = null;

  const GOOGLE_SVG = `<svg width="16" height="16" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>`;

  // ── Auth UI ──────────────────────────────────────────────────────────────
  function renderLoggedIn(user) {
    const initial = (user.displayName || user.email || '?')[0].toUpperCase();
    const avatar = user.photoURL
      ? `<img class="user-avatar" src="${user.photoURL}" alt="${user.displayName}" referrerpolicy="no-referrer">`
      : `<div class="user-avatar-fallback">${initial}</div>`;
    authArea.innerHTML = `
      <div class="user-info">${avatar}<span class="user-name">${user.displayName || user.email}</span></div>
      <button class="btn-logout" id="btnLogout">登出</button>`;
    document.getElementById('btnLogout').addEventListener('click', () => signOut(auth));
  }

  function renderLoggedOut() {
    authArea.innerHTML = `<button class="btn-login" id="btnLogin">${GOOGLE_SVG} 使用 Google 登入</button>`;
    document.getElementById('btnLogin').addEventListener('click', () =>
      signInWithPopup(auth, provider).catch(err => console.error('Login failed:', err))
    );
  }

  // ── Notes ────────────────────────────────────────────────────────────────
  function fmtTime(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleString('zh-TW', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  function renderNoteCard(docSnap) {
    const d = docSnap.data();
    const isOwn = currentUser && currentUser.uid === d.uid;
    const initial = (d.displayName || d.email || '?')[0].toUpperCase();
    const avatar = d.photoURL
      ? `<img class="note-avatar" src="${d.photoURL}" referrerpolicy="no-referrer">`
      : `<div class="note-avatar-fallback">${initial}</div>`;
    return `
      <div class="note-card ${isOwn ? 'own' : ''}">
        <div class="note-header">
          ${avatar}
          <div class="note-meta">
            <div class="note-author">${d.displayName || d.email}</div>
            <div class="note-time">${fmtTime(d.createdAt)}</div>
          </div>
          ${isOwn ? `<button class="btn-delete-note" data-id="${docSnap.id}">刪除</button>` : ''}
        </div>
        <div class="note-content">${d.content.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
      </div>`;
  }

  function updateCounter(myCount) {
    const el = document.getElementById('notesCounter');
    const btn = document.getElementById('btnSubmitNote');
    if (!el) return;
    el.textContent = `${myCount} / ${MAX_NOTES} 筆`;
    el.className = 'notes-counter' + (myCount >= MAX_NOTES ? ' full' : myCount >= 12 ? ' warn' : '');
    if (btn) btn.disabled = myCount >= MAX_NOTES;
  }

  // Start listener immediately — notes are public (readable without login)
  function startNotesListener() {
    if (unsubNotes) return;
    const q = query(NOTES_COL, orderBy('createdAt', 'desc'));
    unsubNotes = onSnapshot(q, (snap) => {
      const list = document.getElementById('notesList');
      if (!list) return;
      if (snap.empty) {
        list.innerHTML = '<div class="notes-empty">還沒有任何筆記，登入後成為第一個留言的人！</div>';
        updateCounter(0);
        return;
      }
      list.innerHTML = snap.docs.map(renderNoteCard).join('');
      const myCount = snap.docs.filter(d => d.data().uid === currentUser?.uid).length;
      updateCounter(myCount);
      list.querySelectorAll('.btn-delete-note').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (!confirm('確定刪除這筆筆記？')) return;
          await deleteDoc(doc(db, 'notes', btn.dataset.id));
        });
      });
    });
  }
  startNotesListener();

  function updateInputArea(user) {
    const inputArea = document.getElementById('notesInputArea');
    const guestPrompt = document.getElementById('notesGuestPrompt');
    if (user) {
      if (inputArea) inputArea.style.display = '';
      if (guestPrompt) guestPrompt.style.display = 'none';
      const btn = document.getElementById('btnSubmitNote');
      if (btn && !btn.dataset.bound) {
        btn.dataset.bound = '1';
        btn.addEventListener('click', async () => {
          const ta = document.getElementById('noteTextarea');
          const content = ta.value.trim();
          if (!content) return;
          const myCount = parseInt(document.getElementById('notesCounter')?.textContent || '0');
          if (myCount >= MAX_NOTES) return;
          btn.disabled = true;
          await addDoc(NOTES_COL, {
            uid:         user.uid,
            displayName: user.displayName || '',
            email:       user.email || '',
            photoURL:    user.photoURL || '',
            content:     content,
            createdAt:   new Date(),
          });
          ta.value = '';
          btn.disabled = false;
        });
      }
    } else {
      if (inputArea) inputArea.style.display = 'none';
      if (guestPrompt) guestPrompt.style.display = '';
    }
  }

  window.onNotesPageOpen = () => updateInputArea(currentUser);

  // ── Auth state ────────────────────────────────────────────────────────────
  onAuthStateChanged(auth, user => {
    currentUser = user;
    if (user) { renderLoggedIn(user); }
    else      { renderLoggedOut();   }
    updateInputArea(user);
  });
</script>

<!-- ── Announcement modal popup ─────────────────────────────────────── -->
<script>
(function() {
  const VERSION = '';
  if (!VERSION) return;                                       // announcement disabled
  const modal = document.getElementById('announceModal');
  if (!modal) return;
  const KEY = 'etf_ann_dismissed_' + VERSION;
  try { if (localStorage.getItem(KEY) === '1') return; } catch (e) {}

  // show on next frame so transition runs
  requestAnimationFrame(() => modal.classList.add('show'));

  const close = () => {
    modal.classList.remove('show');
    try { localStorage.setItem(KEY, '1'); } catch (e) {}
    setTimeout(() => { if (modal.parentNode) modal.parentNode.removeChild(modal); }, 300);
  };

  modal.querySelectorAll('[data-ann-close]').forEach(el => el.addEventListener('click', close));
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && modal.classList.contains('show')) close();
  });
})();
</script>
